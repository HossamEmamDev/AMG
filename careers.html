<!DOCTYPE html>
<html lang="en" dir="ltr" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careers — AMG Main Contracting</title>
  <link rel="icon" id="favicon-link" href="assets/images/amg-logo.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/careers.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    .careers-page-hero {
      background: linear-gradient(135deg, var(--color-secondary) 0%, #1a1a1a 100%);
      padding: 140px 0 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .careers-page-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0 L60 30 L30 60 L0 30 Z' fill='none' stroke='rgba(184,134,11,0.08)' stroke-width='1'/%3E%3C/svg%3E");
    }
    .careers-page-hero h1 { font-family: var(--font-heading); font-size: clamp(2.5rem,5vw,4rem); color: #fff; font-weight: 900; margin-bottom: 16px; }
    .careers-page-hero p { color: rgba(255,255,255,0.7); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }
    .careers-filter { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
    .filter-btn { padding: 8px 22px; border-radius: 100px; border: 2px solid var(--color-border); background: var(--color-white); color: var(--color-text); font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .filter-btn.active, .filter-btn:hover { background: var(--color-primary); border-color: var(--color-primary); color: white; }
    .careers-section { background: var(--color-bg-alt); padding: 80px 0; }
    .careers-grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
  </style>
</head>
<body>

<nav id="navbar" class="navbar scrolled">
  <div class="nav-container">
    <a href="index.html" class="nav-logo"><img id="site-logo" src="assets/images/amg-logo.jpeg" alt="AMG" /></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html" data-en="Home" data-ar="الرئيسية">Home</a></li>
      <li><a href="index.html#services" data-en="Services" data-ar="خدماتنا">Services</a></li>
      <li><a href="index.html#projects" data-en="Projects" data-ar="مشاريعنا">Projects</a></li>
      <li><a href="index.html#contact" data-en="Contact" data-ar="اتصل بنا">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="lang-toggle" id="lang-toggle" onclick="toggleLanguage()" title="Switch language">
        <span class="lang-label" id="lang-label">ع</span>
      </button>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="careers-page-hero">
  <div class="container" style="position:relative;z-index:1">
    <span class="section-tag" data-en="Join Our Team" data-ar="انضم لفريقنا">Join Our Team</span>
    <h1 data-en="Career Opportunities" data-ar="الفرص الوظيفية">Career Opportunities</h1>
    <p data-en="Build your career with AMG Main Contracting Group — where excellence meets opportunity." data-ar="ابنِ مسيرتك المهنية مع مجموعة AMG للمقاولات الرئيسية — حيث يلتقي التميز بالفرصة.">
      Build your career with AMG Main Contracting Group — where excellence meets opportunity.
    </p>
  </div>
</div>

<section class="careers-section">
  <div class="container">
    <div class="careers-filter" id="careers-filter">
      <button class="filter-btn active" data-filter="all" data-en="All Positions" data-ar="جميع الوظائف" onclick="filterCareers('all', this)">All Positions</button>
      <button class="filter-btn" data-filter="full-time" data-en="Full-Time" data-ar="دوام كامل" onclick="filterCareers('full-time', this)">Full-Time</button>
      <button class="filter-btn" data-filter="part-time" data-en="Part-Time" data-ar="دوام جزئي" onclick="filterCareers('part-time', this)">Part-Time</button>
      <button class="filter-btn" data-filter="contract" data-en="Contract" data-ar="عقد" onclick="filterCareers('contract', this)">Contract</button>
    </div>
    <div class="careers-grid" id="careers-grid-full"></div>
  </div>
</section>

<footer class="site-footer" style="padding:40px 0">
  <div class="container">
    <div class="footer-bottom" style="border:none;padding:0">
      <p id="footer-copy">© 2025 AMG Main Contracting. All Rights Reserved.</p>
      <p class="footer-credit">Designed by <strong>Hossam Emam</strong> | <a href="https://wa.me/011124711154" target="_blank"><i class="fab fa-whatsapp"></i> 011124711154</a></p>
    </div>
  </div>
</footer>

<div class="modal-overlay" id="career-modal">
  <div class="modal-box large">
    <button class="modal-close" onclick="closeModal('career-modal')"><i class="fa fa-times"></i></button>
    <div id="career-modal-content"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/lang.js"></script>
<script src="js/careers.js"></script>
<script>
  // Navbar scroll
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
  });
  document.getElementById('hamburger').addEventListener('click', function() {
    this.classList.toggle('active');
    document.getElementById('nav-links').classList.toggle('open');
  });

  let currentFilter = 'all';
  function filterCareers(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAllCareers();
  }

  function renderAllCareers() {
    const lang = document.documentElement.getAttribute('data-lang') || 'en';
    const careers = getData('careers') || [];
    const filtered = currentFilter === 'all' ? careers : careers.filter(c => c.type === currentFilter);
    const grid = document.getElementById('careers-grid-full');
    if (!grid) return;

    const typeLabel = { 'full-time': lang==='ar'?'دوام كامل':'Full-Time', 'part-time': lang==='ar'?'دوام جزئي':'Part-Time', 'contract': lang==='ar'?'عقد':'Contract' };
    if (!filtered.length) {
      grid.innerHTML = `<p style="text-align:center;color:var(--color-text-muted);grid-column:1/-1;padding:40px">${lang==='ar'?'لا توجد وظائف متاحة حالياً':'No positions available currently'}</p>`;
      return;
    }
    grid.innerHTML = filtered.map(c => {
      const shareUrl = encodeURIComponent(window.location.href);
      const shareTitle = encodeURIComponent((c['title_'+lang]||c.title_en) + ' - AMG');
      return `
      <div class="career-card">
        <div class="career-header">
          <h3 class="career-title">${c['title_'+lang]||c.title_en}</h3>
          <span class="career-type ${c.type||'full-time'}">${typeLabel[c.type]||typeLabel['full-time']}</span>
        </div>
        <p class="career-desc" style="-webkit-line-clamp:unset;overflow:visible">${c['desc_'+lang]||c.desc_en}</p>
        <div class="career-requirements">
          <div class="career-req-title">${lang==='ar'?'المتطلبات':'Requirements'}</div>
          <ul class="career-req-list">${(c.requirements||[]).map(r=>`<li>${r}</li>`).join('')}</ul>
        </div>
        <div class="career-footer">
          <span class="career-location"><i class="fa fa-location-dot"></i> ${c['location_'+lang]||c.location_en}</span>
          <div style="display:flex;gap:10px;align-items:center">
            <div class="career-share-btns">
              <a class="career-share-btn share-fb" href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank"><i class="fab fa-facebook-f"></i></a>
              <a class="career-share-btn share-li" href="https://www.linkedin.com/sharing/share-offsite/?url=${shareUrl}" target="_blank"><i class="fab fa-linkedin-in"></i></a>
              <a class="career-share-btn share-wa" href="https://wa.me/?text=${shareTitle}%20${shareUrl}" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
            <button class="btn btn-primary" style="padding:8px 20px;font-size:.82rem" onclick="openApplyModal(${c.id})">${lang==='ar'?'تقدم الآن':'Apply'}</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', renderAllCareers);
  function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
  function openModal(id) { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
  document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o){o.classList.remove('open');document.body.style.overflow='';} }));
</script>
</body>
</html>
